<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Concentrate Texture</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #f7f4ef;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.quiz-wrap {
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  padding: 20px 16px 32px;
}

.quiz-card {
  background: #ffffff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 20px rgba(27, 58, 47, 0.10);
}

.quiz-header {
  background: #1B3A2F;
  padding: 28px 28px 24px;
}

.quiz-header .eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #C8A951;
  margin-bottom: 8px;
}

.quiz-header h2 {
  font-size: 22px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.3;
  margin-bottom: 18px;
}

.progress-track {
  background: rgba(255,255,255,0.15);
  border-radius: 99px;
  height: 4px;
  width: 100%;
}

.progress-fill {
  background: #C8A951;
  border-radius: 99px;
  height: 4px;
  width: 33.3%;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.progress-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  margin-top: 8px;
  text-align: right;
}

.quiz-body {
  padding: 28px 28px 24px;
}

.question-text {
  font-size: 18px;
  font-weight: 600;
  color: #1a1a1a;
  line-height: 1.4;
  margin-bottom: 22px;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 14px 18px;
  background: #f7f4ef;
  border: 2px solid transparent;
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
}

.option-btn:hover {
  background: #eef5f1;
  border-color: #1B3A2F;
  transform: translateY(-1px);
}

.option-btn.selected {
  background: #1B3A2F;
  border-color: #1B3A2F;
}

.option-btn.selected .opt-label,
.option-btn.selected .opt-desc {
  color: #ffffff;
}

.option-btn.selected .opt-icon {
  background: rgba(255,255,255,0.15);
}

.opt-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: #dde8e3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: background 0.18s ease;
}

.opt-text {
  flex: 1;
}

.opt-label {
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  line-height: 1.3;
  transition: color 0.18s ease;
}

.opt-desc {
  font-size: 13px;
  color: #6b7b74;
  margin-top: 2px;
  line-height: 1.4;
  transition: color 0.18s ease;
}

.quiz-footer {
  padding: 0 28px 28px;
  display: flex;
  justify-content: flex-end;
}

.next-btn {
  background: #1B3A2F;
  color: #ffffff;
  border: none;
  border-radius: 10px;
  padding: 13px 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s ease;
  opacity: 0;
  pointer-events: none;
  transform: translateY(4px);
  font-family: inherit;
}

.next-btn.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.next-btn:hover {
  background: #243f34;
  transform: translateY(-1px);
}

.result-section {
  display: none;
}

.result-header {
  background: #1B3A2F;
  padding: 28px 28px 24px;
  text-align: center;
}

.result-tag {
  display: inline-block;
  background: #C8A951;
  color: #1B3A2F;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 99px;
  margin-bottom: 14px;
}

.result-title {
  font-size: 32px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}

.result-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
}

.result-body {
  padding: 28px 28px 8px;
}

.result-stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.result-stat {
  background: #f7f4ef;
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
}

.stat-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8aaa98;
  margin-bottom: 5px;
}

.stat-value {
  font-size: 15px;
  font-weight: 700;
  color: #1B3A2F;
  line-height: 1.2;
}

.result-desc {
  font-size: 15px;
  color: #3a3a3a;
  line-height: 1.7;
  margin-bottom: 22px;
}

.result-cta {
  background: #f7f4ef;
  border-radius: 12px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
  text-decoration: none;
}

.cta-icon {
  width: 44px;
  height: 44px;
  background: #1B3A2F;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 20px;
}

.cta-text-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8aaa98;
  margin-bottom: 2px;
}

.cta-text-title {
  font-size: 15px;
  font-weight: 600;
  color: #1B3A2F;
}

.restart-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 2px solid #e0dbd4;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  color: #8aaa98;
  cursor: pointer;
  transition: all 0.18s ease;
  font-family: inherit;
  margin-bottom: 4px;
}

.restart-btn:hover {
  border-color: #1B3A2F;
  color: #1B3A2F;
}

.slide-in {
  animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(18px); }
  to   { opacity: 1; transform: translateX(0); }
}

@media (max-width: 420px) {
  .quiz-header, .quiz-body, .quiz-footer, .result-body { padding-left: 20px; padding-right: 20px; }
  .result-header { padding-left: 20px; padding-right: 20px; }
  .question-text { font-size: 16px; }
  .result-title { font-size: 26px; }
}
</style>
</head>
<body>

<div class="quiz-wrap">
  <div class="quiz-card">

    <div id="quiz-section">
      <div class="quiz-header">
        <div class="eyebrow">Concentrate Finder</div>
        <h2 id="q-title">Find your texture</h2>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">Question 1 of 3</div>
      </div>

      <div class="quiz-body">
        <div class="question-text" id="question-text"></div>
        <div class="options-list" id="options-list"></div>
      </div>

      <div class="quiz-footer">
        <button class="next-btn" id="next-btn">Next &rarr;</button>
      </div>
    </div>

    <div class="result-section" id="result-section">
      <div class="result-header">
        <div class="result-tag">Your texture match</div>
        <div class="result-title" id="result-title"></div>
        <div class="result-subtitle" id="result-subtitle"></div>
      </div>
      <div class="result-body">
        <div class="result-stat-row" id="result-stats"></div>
        <p class="result-desc" id="result-desc"></p>
        <a class="result-cta" id="result-cta" href="https://mood.com/blog/dab-wax" target="_blank" rel="noopener">
          <div class="cta-icon">&#127807;</div>
          <div>
            <div class="cta-text-label">Learn more</div>
            <div class="cta-text-title" id="cta-label">Explore concentrates at Mood</div>
          </div>
        </a>
        <button class="restart-btn" id="restart-btn">&#8635; Start over</button>
      </div>
    </div>

  </div>
</div>

<script>
var questions = [
  {
    text: "What matters most to you in a concentrate?",
    options: [
      { icon: "⚡", label: "Pure potency",    desc: "I want the strongest experience.",           scores: { shatter: 2, crumble: 0, badder: 1 } },
      { icon: "🌿", label: "Rich flavor",      desc: "Terpenes and taste come first for me.",      scores: { shatter: 0, crumble: 2, badder: 1 } },
      { icon: "✌️", label: "Easy handling",    desc: "I want something I can work with quickly.", scores: { shatter: 0, crumble: 1, badder: 2 } }
    ]
  },
  {
    text: "How do you prefer to work with your concentrate?",
    options: [
      { icon: "💎", label: "Snap and dab",     desc: "Break off a piece and go.",                  scores: { shatter: 2, crumble: 1, badder: 0 }, badderHint: null },
      { icon: "🍯", label: "Scoop and load",   desc: "A tool and a creamy texture.",               scores: { shatter: 0, crumble: 0, badder: 2 }, badderHint: "tropical" },
      { icon: "👌", label: "Crumble and pack", desc: "A loose, flexible texture I can pinch.",     scores: { shatter: 0, crumble: 2, badder: 1 }, badderHint: null }
    ]
  },
  {
    text: "Pick the session that sounds most like you:",
    options: [
      { icon: "🎯", label: "Clean and precise",  desc: "Minimal fuss, maximum effect.",         scores: { shatter: 2, crumble: 0, badder: 1 }, badderHint: "ice" },
      { icon: "🌊", label: "Bold and flavorful", desc: "I want to taste every terpene.",         scores: { shatter: 0, crumble: 2, badder: 1 }, badderHint: "blue" },
      { icon: "☁️", label: "Smooth and easy",    desc: "Relaxed, no-stress, effortless.",        scores: { shatter: 0, crumble: 1, badder: 2 }, badderHint: "tropical" }
    ]
  }
];

var badderProducts = {
  tropical: {
    ctaLabel: "Try: THCa Tropical Storm Dab Badder",
    ctaUrl:   "https://mood.com/product/thca-tropical-storm-dab-badder?bcc=concentrates%2Fdab",
    note:     "Tropical Storm — bright, fruity terpenes, 82.43% THCa, rated 4.48/5."
  },
  blue: {
    ctaLabel: "Try: THCa Blue Fire Dab Badder",
    ctaUrl:   "https://mood.com/product/thca-blue-fire-dab-badder?bcc=concentrates%2Fdab",
    note:     "Blue Fire — bold, complex terpene profile with a deep, earthy finish."
  },
  ice: {
    ctaLabel: "Try: THCa Ice Queen Dab Badder",
    ctaUrl:   "https://mood.com/product/thca-ice-queen-dab-badder?bcc=concentrates%2Fdab",
    note:     "Ice Queen — clean, crisp expression with a smooth, precise finish."
  }
};

var results = {
  shatter: {
    title:    "THCa Moonrocks",
    subtitle: "Potent. Dense. Precise.",
    stats: [
      { label: "Format",   value: "Moonrock" },
      { label: "Potency",  value: "Very strong" },
      { label: "Handling", value: "Snap & dab" }
    ],
    desc: "You want maximum potency and a clean, precise experience. Mood's THCa Moonrocks are the closest match — densely concentrated, made for the intentional dabber who knows exactly what they want.",
    ctaLabel: "Try: THCa Moonrocks",
    ctaUrl:   "https://mood.com/product/thca-moonrocks?bcc=concentrates%2Fmoonrocks"
  },
  crumble: {
    title:    "Classic Hash",
    subtitle: "Flavorful. Traditional. Expressive.",
    stats: [
      { label: "Format",   value: "Hash" },
      { label: "Flavor",   value: "Complex" },
      { label: "Handling", value: "Flexible" }
    ],
    desc: "You're chasing flavor and complexity over everything else. Mood's Classic Hash is made for the terpene-forward session — rich, layered, and versatile enough to use in multiple ways.",
    ctaLabel: "Try: Classic Hash",
    ctaUrl:   "https://mood.com/product/classic-hash?bcc=concentrates%2Fhash"
  },
  badder: {
    title:    "Dab Badder",
    subtitle: "Creamy. Scoopable. Effortless.",
    stats: [
      { label: "Texture",  value: "Creamy" },
      { label: "Flavor",   value: "Rich" },
      { label: "Handling", value: "Easy" }
    ],
    desc: "Badder is whipped during finishing for a smooth, scoopable consistency that is easier to handle than any other concentrate texture. Mood uses a THCa isolate method — 99.99% purity, reformulated with strain-specific terpenes.",
    ctaLabel: "Try: THCa Dab Badder",
    ctaUrl:   "https://mood.com/product/thca-tropical-storm-dab-badder?bcc=concentrates%2Fdab"
  }
};

var currentQ   = 0;
var scores     = { shatter: 0, crumble: 0, badder: 0 };
var selected   = null;
var answers    = [];

function render() {
  var q = questions[currentQ];
  document.getElementById("question-text").textContent = q.text;
  document.getElementById("progress-label").textContent = "Question " + (currentQ + 1) + " of " + questions.length;
  document.getElementById("progress-fill").style.width = (((currentQ + 1) / questions.length) * 100) + "%";

  var list = document.getElementById("options-list");
  list.innerHTML = "";
  selected = null;
  document.getElementById("next-btn").classList.remove("visible");

  q.options.forEach(function(opt, i) {
    var btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML =
      '<div class="opt-icon">' + opt.icon + '</div>' +
      '<div class="opt-text">' +
        '<div class="opt-label">' + opt.label + '</div>' +
        '<div class="opt-desc">' + opt.desc + '</div>' +
      '</div>';
    btn.addEventListener("click", function() {
      document.querySelectorAll(".option-btn").forEach(function(b) { b.classList.remove("selected"); });
      btn.classList.add("selected");
      selected = i;
      document.getElementById("next-btn").classList.add("visible");
    });
    list.appendChild(btn);
  });

  list.classList.remove("slide-in");
  void list.offsetWidth;
  list.classList.add("slide-in");
}

function advance() {
  if (selected === null) return;
  var opt = questions[currentQ].options[selected];
  scores.shatter += opt.scores.shatter;
  scores.crumble += opt.scores.crumble;
  scores.badder  += opt.scores.badder;
  answers.push({ q: currentQ, i: selected, badderHint: opt.badderHint || null });

  currentQ++;
  if (currentQ < questions.length) {
    render();
  } else {
    showResult();
  }
}

function pickBadderProduct() {
  for (var i = answers.length - 1; i >= 0; i--) {
    if (answers[i].badderHint && badderProducts[answers[i].badderHint]) {
      return badderProducts[answers[i].badderHint];
    }
  }
  return badderProducts.tropical;
}

function showResult() {
  document.getElementById("progress-fill").style.width = "100%";

  var winner = "shatter";
  if (scores.crumble > scores[winner]) winner = "crumble";
  if (scores.badder  > scores[winner]) winner = "badder";

  var r = JSON.parse(JSON.stringify(results[winner]));

  if (winner === "badder") {
    var bp = pickBadderProduct();
    r.ctaLabel = bp.ctaLabel;
    r.ctaUrl   = bp.ctaUrl;
    r.desc     = r.desc + " " + bp.note;
  }

  document.getElementById("result-title").textContent    = r.title;
  document.getElementById("result-subtitle").textContent = r.subtitle;
  document.getElementById("result-desc").textContent     = r.desc;
  document.getElementById("cta-label").textContent       = r.ctaLabel;
  document.getElementById("result-cta").href             = r.ctaUrl;

  var statsEl = document.getElementById("result-stats");
  statsEl.innerHTML = "";
  r.stats.forEach(function(s) {
    var el = document.createElement("div");
    el.className = "result-stat";
    el.innerHTML = '<div class="stat-label">' + s.label + '</div><div class="stat-value">' + s.value + '</div>';
    statsEl.appendChild(el);
  });

  document.getElementById("quiz-section").style.display   = "none";
  document.getElementById("result-section").style.display = "block";
  document.getElementById("result-section").classList.add("slide-in");
}

function restart() {
  currentQ = 0;
  scores   = { shatter: 0, crumble: 0, badder: 0 };
  selected = null;
  answers  = [];
  document.getElementById("result-section").style.display = "none";
  document.getElementById("quiz-section").style.display   = "block";
  render();
}

document.getElementById("next-btn").addEventListener("click", advance);
document.getElementById("restart-btn").addEventListener("click", restart);

render();
</script>
</body>
</html>
